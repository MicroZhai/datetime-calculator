<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>时间计算器</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ====== 顶部栏 ====== -->
  <header id="top-bar">
    <button id="theme-btn" class="icon-btn" title="切换主题" aria-label="切换主题">🌓</button>
    <h1 class="app-title">时间计算器</h1>
    <button id="new-btn" class="icon-btn" title="新建计算器" aria-label="新建计算器">＋</button>
  </header>

  <!-- ====== 开始时间 ====== -->
  <div id="current-time-bar">
    <div id="current-time-display" class="current-time-text">--:--:--</div>
    <div id="current-date-display" class="current-date-text"></div>
  </div>

  <!-- ====== 计算器列表 ====== -->
  <main id="calc-list">
    <!-- JS 动态渲染卡片 -->
  </main>

  <!-- ====== 空状态提示 ====== -->
  <div id="empty-state" class="hidden">
    <div class="empty-icon">⏱️</div>
    <p>还没有计算器</p>
    <button id="empty-new-btn" class="btn-primary">新建第一个</button>
  </div>

  <!-- ====== 编辑弹窗（底部抽屉） ====== -->
  <div id="sheet-overlay" class="sheet-overlay hidden"></div>
  <div id="edit-sheet" class="edit-sheet">
    <div class="sheet-handle"></div>

    <div class="sheet-header">
      <h2 id="sheet-title">新建计算器</h2>
      <button id="sheet-close-btn" class="icon-btn" aria-label="关闭">✕</button>
    </div>

    <div class="sheet-body">
      <!-- 名称 -->
      <div class="form-group">
        <label for="input-name">名称</label>
        <input type="text" id="input-name" maxlength="30" placeholder="例如：会议结束时间">
      </div>

      <!-- 计算 — 开始时间 -->
      <div class="form-group">
        <label>开始时间</label>
        <div class="time-row">
          <input type="date" id="input-date" class="time-input">
          <input type="time" id="input-time" class="time-input">
        </div>
        <button id="now-btn" class="btn-now">🕐 此刻</button>
      </div>

      <!-- 时段列表 -->
      <div class="form-group">
        <label>时段列表</label>
        <div id="segments-container">
          <!-- JS 动态渲染时段编辑器 -->
        </div>
        <button id="add-segment-btn" class="btn-add-segment">+ 添加时段</button>
      </div>

      <!-- 时长历史 -->
      <div class="form-group">
        <label>历史时长（填入当前时段）</label>
        <div id="duration-history" class="quick-durations">
          <!-- JS 动态渲染 -->
        </div>
      </div>
    </div>

    <div class="sheet-footer">
      <button id="save-btn" class="btn-primary">保存</button>
      <button id="delete-btn" class="btn-danger hidden">删除此计算器</button>
    </div>
  </div>

  <!-- ====== 右键菜单（卡片上的 ⋮） ====== -->
  <div id="context-menu" class="context-menu hidden">
    <button id="ctx-rename">✏️ 重命名</button>
    <button id="ctx-delete">🗑️ 删除</button>
  </div>

  <!-- ====== Toast 提示 ====== -->
  <div id="toast" class="toast hidden"></div>

  <script src="js/storage.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
