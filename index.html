<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>时间计算器</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ====== 更新横幅 ====== -->
  <div id="update-banner" class="update-banner hidden">
    <span>发现新版本</span>
    <button id="update-btn" class="update-btn">更新</button>
  </div>

  <!-- ====== 侧边栏遮罩 ====== -->
  <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

  <!-- ====== 侧边栏 ====== -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">⏱️</span>
      <span class="sidebar-title">时间计算器</span>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">分组</div>
      <button id="sidebar-groups-toggle" class="sidebar-item">
        <span class="sidebar-icon">📁</span>
        <span>分组管理</span>
        <span class="sidebar-arrow">▼</span>
      </button>
      <div id="sidebar-group-list" class="sidebar-submenu hidden"></div>
      <div class="sidebar-section-label">设置</div>
      <div class="sidebar-sub-item">
        <span class="sidebar-icon">🌓</span>
        <span>主题模式</span>
        <select id="sidebar-theme-select" class="sidebar-select">
          <option value="auto">跟随系统</option>
          <option value="light">浅色</option>
          <option value="dark">深色</option>
        </select>
      </div>
      <div class="sidebar-section-label">外观</div>
      <div class="sidebar-sub-item">
        <span class="sidebar-icon">🎨</span>
        <span>背景样式</span>
        <select id="sidebar-bg-select" class="sidebar-select">
          <option value="none">纯色</option>
          <option value="grid">网格</option>
          <option value="gradient">渐变</option>
          <option value="geometry">几何</option>
          <option value="dynamic">动态</option>
        </select>
      </div>
      <button id="sidebar-about" class="sidebar-item">
        <span class="sidebar-icon">ℹ️</span>
        <span>关于</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <span class="sidebar-version">版本 1.0.0</span>
    </div>
  </aside>

  <!-- ====== 顶部栏 ====== -->
  <header id="top-bar">
    <button id="menu-btn" class="icon-btn" title="菜单" aria-label="菜单">☰</button>
    <h1 class="app-title">时间计算器</h1>
    <button id="history-btn" class="icon-btn" title="计算历史" aria-label="计算历史">🕘</button>
  </header>

  <!-- ====== 分组选择栏 ====== -->
  <div id="group-filter-bar">
    <button class="group-tab active" data-group="">全部</button>
  </div>

  <!-- ====== 开始时间 ====== -->
  <div id="current-time-bar">
    <div id="current-time-display" class="current-time-text">--:--:--</div>
    <div id="current-date-display" class="current-date-text"></div>
  </div>

  <!-- ====== 计算器列表 ====== -->
  <main id="calc-list">
    <!-- JS 动态渲染卡片 -->
  </main>

  <!-- ====== 底部新建按钮 ====== -->
  <button id="new-btn-bottom" class="fab-btn" title="新建计算器" aria-label="新建计算器">＋</button>

  <!-- ====== 空状态提示 ====== -->
  <div id="empty-state" class="hidden">
    <div class="empty-icon">⏱️</div>
    <p>还没有计算器</p>
    <button id="empty-new-btn" class="btn-primary">新建第一个</button>
  </div>

  <!-- ====== 编辑弹窗（底部抽屉） ====== -->
  <div id="sheet-overlay" class="sheet-overlay hidden"></div>
  <div id="edit-sheet" class="edit-sheet">
    <div class="sheet-handle"></div>

    <div class="sheet-header">
      <h2 id="sheet-title">新建计算器</h2>
      <button id="sheet-close-btn" class="icon-btn" aria-label="关闭">✕</button>
    </div>

    <div class="sheet-body">
      <!-- 名称 -->
      <div class="form-group">
        <label for="input-name">名称</label>
        <input type="text" id="input-name" maxlength="30" placeholder="例如：会议结束时间">
      </div>

      <!-- 计算 — 开始时间 -->
      <div class="form-group">
        <label>开始时间</label>
        <div class="time-row time-row--readonly">
          <span id="base-time-display">--</span>
          <button id="now-btn" class="btn-now-inline">此刻</button>
        </div>
      </div>

      <!-- 所属分组 -->
      <div class="form-group">
        <label>所属分组</label>
        <select id="input-group" class="form-select"></select>
      </div>

      <!-- 时段列表 -->
      <div class="form-group">
        <label>时段列表</label>
        <div id="segments-container">
          <!-- JS 动态渲染时段编辑器 -->
        </div>
        <button id="add-segment-btn" class="btn-add-segment">+ 添加时段</button>
      </div>

      <!-- 时长历史 -->
      <div class="form-group">
        <label>历史时长（填入当前时段）</label>
        <div id="duration-history" class="quick-durations">
          <!-- JS 动态渲染 -->
        </div>
      </div>
    </div>

    <div class="sheet-footer">
      <button id="save-btn" class="btn-primary">保存</button>
      <button id="delete-btn" class="btn-danger hidden">删除此计算器</button>
    </div>
  </div>

  <!-- ====== 右键菜单（卡片上的 ⋮） ====== -->
  <div id="context-menu" class="context-menu hidden">
    <button id="ctx-pin">📌 置顶</button>
    <button id="ctx-rename">✏️ 重命名</button>
    <button id="ctx-copy-detail">📋 复制计算详情</button>
    <button id="ctx-move-group">📁 移动到分组</button>
    <button id="ctx-delete">🗑️ 删除</button>
  </div>

  <!-- ====== 历史弹窗 ====== -->
  <div id="history-overlay" class="sheet-overlay hidden"></div>
  <div id="history-sheet" class="edit-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2>计算历史</h2>
      <button id="history-close-btn" class="icon-btn" aria-label="关闭">✕</button>
    </div>
    <div class="sheet-body" id="history-list">
      <!-- JS 动态渲染 -->
    </div>
    <div class="sheet-footer">
      <button id="clear-history-btn" class="btn-danger">清空全部历史</button>
    </div>
  </div>

  <!-- ====== 确认弹窗 ====== -->
  <div id="confirm-overlay" class="confirm-overlay hidden"></div>
  <div id="confirm-dialog" class="confirm-dialog">
    <p id="confirm-msg" class="confirm-msg"></p>
    <div class="confirm-btns">
      <button id="confirm-cancel-btn" class="confirm-btn confirm-btn--cancel">取消</button>
      <button id="confirm-ok-btn" class="confirm-btn confirm-btn--danger">删除</button>
    </div>
  </div>

  <!-- ====== Toast 提示 ====== -->
  <div id="toast" class="toast hidden"></div>

  <script src="js/storage.js"></script>
  <script src="js/groups.js"></script>
  <script src="js/history.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/ui-render.js"></script>
  <script src="js/ui-sheet.js"></script>
  <script src="js/ui-history.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
